server:
  port: 3000

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/random_app}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

jwt:
  secret: ${JWT_SECRET:RandomAppSecretKey2026VeryLongSecretKeyForJwtTokenSigning}
  expiration: 86400000

llm:
  enabled: ${LLM_ENABLED:true}
  base-url: ${LLM_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
  api-key: ${LLM_API_KEY:tp-carujz06z5grnyy3fr9eqbenhdkvptxel7vfu9efiwi5jsrn}
  model: ${LLM_MODEL:mimo-v2.5-pro}
  timeout: 60000
